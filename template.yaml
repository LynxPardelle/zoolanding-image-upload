AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Zoolanding Image Upload Presign Lambda - SAM Template

Parameters:
  PublicFilesBucketName:
    Type: String
    Default: zoolandingpage-public-files
    Description: S3 bucket that stores public image assets.
  PublicFilesBaseUrl:
    Type: String
    Default: https://assets.zoolandingpage.com.mx
    Description: CDN or custom origin base URL for public asset links.
  PresignExpirationSeconds:
    Type: String
    Default: '900'
    Description: Presigned upload URL lifetime in seconds.
  PublicFileCacheControl:
    Type: String
    Default: public, max-age=31536000, immutable
    Description: Cache-Control header applied to public uploaded assets.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues: [DEBUG, INFO, WARNING, ERROR]
    Description: Log level for the Lambda.

Globals:
  Function:
    Runtime: python3.13
    Timeout: 30
    MemorySize: 512
    Tracing: PassThrough

Resources:
  ImageUploadApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowMethods: "'POST,OPTIONS'"

  ImageUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: lambda_function.lambda_handler
      Description: Issues presigned upload URLs for public image assets.
      Environment:
        Variables:
          PUBLIC_FILES_BUCKET_NAME:
            Ref: PublicFilesBucketName
          PUBLIC_FILES_BASE_URL:
            Ref: PublicFilesBaseUrl
          PRESIGN_EXPIRATION_SECONDS:
            Ref: PresignExpirationSeconds
          PUBLIC_FILE_CACHE_CONTROL:
            Ref: PublicFileCacheControl
          DEFAULT_IMAGE_MAX_WIDTH: '2048'
          DEFAULT_IMAGE_MAX_HEIGHT: '2048'
          JPEG_QUALITY: '82'
          WEBP_QUALITY: '80'
          PNG_COMPRESS_LEVEL: '9'
          LOG_LEVEL:
            Ref: LogLevel
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                Fn::Sub: arn:aws:s3:::${PublicFilesBucketName}/*
      Events:
        ImageUploadPost:
          Type: Api
          Properties:
            RestApiId:
              Ref: ImageUploadApi
            Path: /image-upload/presign
            Method: POST

Outputs:
  ApiUrl:
    Description: Image upload presign endpoint URL.
    Value:
      Fn::Sub: https://${ImageUploadApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/image-upload/presign
  FunctionName:
    Description: Deployed Lambda function name.
    Value:
      Ref: ImageUploadFunction
